<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Community Service Hours Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <img src="https://www.rivers.org/wp-content/uploads/2020/09/rivers-logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
      <h1>Community Service Hours Tracker</h1>
      <p class="tag">Keep track of your volunteer work</p>
    </div>
  </header>

  <main class="container">
    <section class="tracker">
      <form id="entryForm" class="entry-form" autocomplete="off">
        <div class="row">
          <label>
            Date
            <input type="date" id="date" required />
          </label>
          <label>
            Organization
            <input type="text" id="org" placeholder="e.g., Food Bank" required />
          </label>
          <label>
  Impact Population / Cause
  <select id="cause" required>
    <option value="" disabled selected>Select a cause...</option>
    <option value="Advocacy">Advocacy, Activism & Community Organizing</option>
    <option value="Elderly">Aging/Elderly</option>
    <option value="Animal">Animal (Ex: shelters)</option>
    <option value="Disability">Disability Awareness and Programming</option>
    <option value="Environmental">Environmental (Ex: farming, trails)</option>
    <option value="Health">Health and Wellness</option>
    <option value="Housing/Food">Housing & Food Insecurities</option>
    <option value="Immigration">Immigration & English Language Learners</option>
    <option value="Incarcerated">Incarcerated Adults or Youth</option>
    <option value="Philanthropy">Philanthropy and Fundraising</option>
    <option value="Red Key">Red Key (Max 10 hours for grad)</option>
    <option value="Youth-Social">Youth Social Emotional (Mentoring/Camps)</option>
    <option value="Youth-Academic">Youth Academic (Tutoring)</option>
    <option value="Other">Other</option>
  </select>
</label>
        </div>

        <div class="row">
          <label>
            Hours
            <input type="number" id="hours" min="0.1" step="0.1" placeholder="1.5" required />
          </label>
          <label>
            Description
            <input type="text" id="desc" placeholder="What you did" />
          </label>
          <label>
            Organizer Contact
            <input type="text" id="contact" placeholder="Email or Phone">
          </label>
        </div>

        <div class="form-actions">
          <button type="submit" id="addBtn" class="btn primary">Add entry</button>
          <button type="button" id="clearBtn" class="btn ghost">Clear all</button>
          <button type="button" id="exportBtn" class="btn ghost">Export CSV</button>
        </div>
      </form>

      <div class="summary">
        <div class="summary-row">
          <div>
            <h3>Total hours</h3>
            <div id="totalHours" class="big-number">0.00</div>
          </div>
          <div>
            <h3>Goal (hours)</h3>
            <div id="goalDisplay" class="big-number">30</div>
          </div>
        </div>

        <div class="progress-wrap">
          <div id="progressBar" class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="progressFill" class="progress-fill" style="width: 0%;"></div>
          </div>
          <div class="progress-text"><span id="progressPercent">0%</span> of your goal</div>
        </div>
      </div>
    </section>

    <section class="list-section">
      <h2>Entries (Stacked by Organization)</h2>
      <div class="table-wrap">
        <table id="entriesTable" class="entries-table">
          <thead>
            <tr>
              <th>Date(s)</th>
              <th>Organization</th>
              <th>Cause</th>
              <th>Description</th>
              <th>Total Hours</th>
              <th>Contact</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="entriesBody"></tbody>
        </table>
      </div>

      <div class="controls">
        <label>
          Filter by org:
          <input id="filterOrg" type="text" placeholder="Type to filter..." />
        </label>
        <button id="applyFilter" class="btn ghost">Apply</button>
        <button id="clearFilter" class="btn ghost">Clear</button>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; Community Service Tracker</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
